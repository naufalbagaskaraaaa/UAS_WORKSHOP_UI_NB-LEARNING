<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk — NB-Learning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin-style.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== Navbar Sederhana ===== */
    .auth-nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
    }
    .auth-nav__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
    }
    .auth-nav__logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 20px;
      color: var(--primary);
      text-decoration: none;
    }
    .auth-nav__logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 700;
    }
    .auth-nav__link {
      color: var(--text-secondary);
      font-size: 14px;
      text-decoration: none;
      transition: var(--transition);
    }
    .auth-nav__link:hover {
      color: var(--primary);
    }

    .auth-wrapper {
      display: flex;
      width: 100%;
      max-width: 1200px;
      height: 90vh;
      max-height: 800px;
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      margin: 0 24px;
      margin-top: 70px;
    }

    .auth-left {
      flex: 0 0 50%;
      background: linear-gradient(145deg, var(--primary), #3730a3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 48px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .auth-left::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 70% 30%, rgba(255,255,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .auth-left__brand {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }
    .auth-left__brand span {
      background: rgba(255,255,255,0.15);
      padding: 4px 12px;
      border-radius: var(--radius-sm);
      margin-right: 4px;
    }
    .auth-left__illustration {
      font-size: 96px;
      margin: 24px 0 16px;
      position: relative;
      z-index: 1;
    }
    .auth-left__tagline {
      font-size: 18px;
      font-weight: 500;
      max-width: 320px;
      line-height: 1.6;
      opacity: 0.9;
      position: relative;
      z-index: 1;
    }
    .auth-left__tagline small {
      display: block;
      font-size: 13px;
      font-weight: 400;
      opacity: 0.7;
      margin-top: 8px;
    }

    .auth-right {
      flex: 0 0 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      background: var(--bg-card);
    }
    .auth-right__inner {
      width: 100%;
      max-width: 380px;
    }
    .auth-right__title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .auth-right__sub {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      background: var(--bg-page);
      transition: var(--transition);
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--bg-card);
      box-shadow: 0 0 0 4px var(--primary-light);
    }

    .auth-right__options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 13px;
    }
    .auth-right__remember {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .auth-right__remember input[type="checkbox"] {
      accent-color: var(--primary);
      width: 16px;
      height: 16px;
      margin: 0;
    }
    .auth-right__forgot {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
    }
    .auth-right__forgot:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    .btn--block {
      width: 100%;
      justify-content: center;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      border-radius: var(--radius-sm);
    }

    .auth-right__footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .auth-right__footer a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
      transition: var(--transition);
    }
    .auth-right__footer a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    @media (max-width: 992px) {
      .auth-wrapper {
        flex-direction: column;
        height: auto;
        max-height: none;
        border-radius: var(--radius-lg);
        margin: 24px;
        margin-top: 80px;
      }
      .auth-left {
        flex: 0 0 auto;
        padding: 40px 24px;
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      }
      .auth-left__illustration { font-size: 64px; }
      .auth-left__tagline { font-size: 16px; max-width: 280px; }
      .auth-right {
        flex: 0 0 auto;
        padding: 32px 24px;
      }
      .auth-right__inner { max-width: 100%; }
    }

    @media (max-width: 480px) {
      .auth-wrapper { margin: 12px; margin-top: 70px; border-radius: var(--radius-md); }
      .auth-left { padding: 32px 16px; }
      .auth-left__brand { font-size: 24px; }
      .auth-left__illustration { font-size: 48px; margin: 12px 0; }
      .auth-right { padding: 24px 16px; }
      .auth-right__title { font-size: 22px; }
      .auth-right__options { flex-direction: column; align-items: flex-start; gap: 8px; }
    }
  </style>
</head>
<body>
