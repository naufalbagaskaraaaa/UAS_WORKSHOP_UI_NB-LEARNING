<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lupa Password — NB-Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="admin-style.css" />

    <style>
      /* ===== Reset / Base ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg-page);
        color: var(--text-primary);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ===== Split Screen ===== */
      .auth-wrapper {
        display: flex;
        width: 100%;
        max-width: 1200px;
        height: 90vh;
        max-height: 800px;
        background: var(--bg-card);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
        margin: 0 24px;
      }

      /* ===== Sisi Kiri ===== */
      .auth-left {
        flex: 0 0 50%;
        background: linear-gradient(145deg, var(--primary), #3730a3);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        padding: 48px 40px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .auth-left::before {
        content: "";
        position: absolute;
        top: -50%;
        right: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle at 70% 30%,
          rgba(255, 255, 255, 0.08) 0%,
          transparent 60%
        );
        pointer-events: none;
      }

      .auth-left__brand {
        font-size: 32px;
        font-weight: 900;
        letter-spacing: -1px;
        margin-bottom: 16px;
        position: relative;
        z-index: 1;
      }

      .auth-left__brand span {
        background: rgba(255, 255, 255, 0.15);
        padding: 4px 12px;
        border-radius: var(--radius-sm);
        margin-right: 4px;
      }

      .auth-left__illustration {
        font-size: 96px;
        margin: 24px 0 16px;
        position: relative;
        z-index: 1;
      }

      .auth-left__tagline {
        font-size: 18px;
        font-weight: 500;
        max-width: 320px;
        line-height: 1.6;
        opacity: 0.9;
        position: relative;
        z-index: 1;
      }

      .auth-left__tagline small {
        display: block;
        font-size: 13px;
        font-weight: 400;
        opacity: 0.7;
        margin-top: 8px;
      }

      /* ===== Sisi Kanan ===== */
      .auth-right {
        flex: 0 0 50%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 40px;
        background: var(--bg-card);
      }

      .auth-right__inner {
        width: 100%;
        max-width: 380px;
      }

      .auth-right__title {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: var(--text-primary);
        margin-bottom: 4px;
      }

      .auth-right__sub {
        font-size: 14px;
        color: var(--text-secondary);
        margin-bottom: 32px;
      }

      /* ===== Form ===== */
      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        font-weight: 600;
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 4px;
      }

      .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        font-family: "Inter", sans-serif;
        font-size: 14px;
        color: var(--text-primary);
        background: var(--bg-page);
        transition: var(--transition);
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--primary);
        background: var(--bg-card);
        box-shadow: 0 0 0 4px var(--primary-light);
      }

      .form-group input::placeholder {
        color: var(--text-muted);
      }

      /* ===== Tombol ===== */
      .btn--block {
        width: 100%;
        justify-content: center;
        padding: 14px;
        font-size: 15px;
        font-weight: 700;
        border-radius: var(--radius-sm);
      }

      .auth-right__back {
        text-align: center;
        margin-top: 24px;
        font-size: 14px;
      }

      .auth-right__back a {
        color: var(--text-secondary);
        text-decoration: none;
        font-weight: 500;
        transition: var(--transition);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .auth-right__back a:hover {
        color: var(--primary);
      }

      .auth-right__info {
        text-align: center;
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 16px;
        line-height: 1.6;
      }

      /* ===== Responsive ===== */
      @media (max-width: 992px) {
        .auth-wrapper {
          flex-direction: column;
          height: auto;
          max-height: none;
          border-radius: var(--radius-lg);
          margin: 24px;
        }
        .auth-left {
          flex: 0 0 auto;
          padding: 40px 24px;
          border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }
        .auth-left__illustration {
          font-size: 64px;
        }
        .auth-left__tagline {
          font-size: 16px;
          max-width: 280px;
        }
        .auth-right {
          flex: 0 0 auto;
          padding: 32px 24px;
        }
        .auth-right__inner {
          max-width: 100%;
        }
      }

      @media (max-width: 480px) {
        .auth-wrapper {
          margin: 12px;
          border-radius: var(--radius-md);
        }
        .auth-left {
          padding: 32px 16px;
        }
        .auth-left__brand {
          font-size: 24px;
        }
        .auth-left__illustration {
          font-size: 48px;
          margin: 12px 0;
        }
        .auth-right {
          padding: 24px 16px;
        }
        .auth-right__title {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-wrapper">
      <!-- Sisi Kiri -->
      <div class="auth-left">
        <div class="auth-left__brand"><span>NB</span>Learning</div>
        <div class="auth-left__illustration">🔐</div>
        <div class="auth-left__tagline">
          Jangan Khawatir, Kami Bantu
          <small>Reset kata sandi Anda dengan mudah</small>
        </div>
      </div>

      <!-- Sisi Kanan -->
      <div class="auth-right">
        <div class="auth-right__inner">
          <h1 class="auth-right__title">Lupa Password?</h1>
          <p class="auth-right__sub">
            Masukkan email Anda untuk menerima link reset
          </p>

          <form>
            <div class="form-group">
              <label for="email">Alamat Email</label>
              <input
                type="email"
                id="email"
                placeholder="masukkan email terdaftar"
                required
              />
            </div>

            <button type="submit" class="btn btn--primary btn--block">
              Kirim Link Reset
            </button>
          </form>

          <p class="auth-right__back">
            <a href="login.html">← Kembali ke halaman masuk</a>
          </p>

          <p class="auth-right__info">
            Kami akan mengirimkan tautan reset kata sandi ke email Anda.<br />
            Pastikan email yang Anda masukkan sudah terdaftar di NB-Learning.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
